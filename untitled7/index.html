<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rest Countries App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href=".idea/style.css">


<body>
    <div class="page-filter">
    </div>
</body>

<div class="page-wrapper">


    <header class="page-header">
        <div class="logo">
            🌍
            <h1>Where in the world?</h1>
        </div>

        <button id="themeToggle">
            Light mode
        </button>
    </header>
    <div class="hero-bg">
        <img src=".idea/images/globe.png" alt="Globe">
    </div>

    <section class="controls">
        <input
                type="text"
                id="searchInput"
                placeholder="Search for a country..."
        >
        <select id="regionFilter">
            <option value="">Filter by Region</option>
            <option>Africa</option>
            <option>Americas</option>
            <option>Asia</option>
            <option>Europe</option>
            <option>Oceania</option>
        </select>
    </section>

    <p class="subtitle">
    <p id="countryCount">
        Explore <span>250+</span> countries around the world
    </p>

    <div id="countries" class="countries-container"></div>

</div>

<script src="script.js"></script>

<script src="script.js"></script>
</html>
